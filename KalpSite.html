<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Elif ❤️</title>
    <style>
        body {
            background-color: #000;
            margin: 0;
            overflow: hidden;
            height: 100vh;
        }

        /* TAM ORTALAMA */
        #heart-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
        }

        .love-text {
            position: absolute;
            color: #ff5e99;
            font-family: 'Arial', sans-serif;
            font-size: 15px;
            font-weight: bold;
            white-space: nowrap;

            text-shadow: 0 0 10px #ff5e99, 0 0 20px #ff5e99;
            pointer-events: none;

            /* MERKEZLEME FIX */
            transform: translate(-50%, -50%);

            animation: heart-anim 2.5s infinite linear;
            opacity: 0;
        }

        @keyframes heart-anim {
            0% {
                transform: translate(-50%, -50%) scale(0.6);
                opacity: 0;
            }
            20% {
                opacity: 1;
            }
            80% {
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) scale(1.1);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

<div id="heart-container"></div>

<script>
    const container = document.getElementById('heart-container');
    const textContent = "I love you";
    const total = 120;

    function createHeart() {
        const containerSize = 600;
        const center = containerSize / 2;

        for (let i = 0; i < total; i++) {
            const span = document.createElement('span');
            span.className = 'love-text';
            span.innerText = textContent;

            const t = (i / total) * 2 * Math.PI;
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));

            const multiplier = 16;
            const left = center + x * multiplier;
            const top = center + y * multiplier;

            span.style.left = `${left}px`;
            span.style.top = `${top}px`;

            const delay = Math.random() * 2.5;
            span.style.animationDelay = `${delay}s`;

            container.appendChild(span);
        }
    }

    createHeart();
</script>

</body>
</html>
